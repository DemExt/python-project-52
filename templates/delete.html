{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<h1 class="my-4">Удаление пользователя</h1>
<p>Вы уверены, что хотите удалить {{ object.username }}?</p>

<form method="post">
    {% csrf_token %}
    {% bootstrap_button button_type="submit" content="Да, удалить" button_class="btn-danger" %}
</form>
{% endblock %}
